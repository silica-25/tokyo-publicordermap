<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京リアル治安マップ | 面積・凶悪犯罪考慮版ダッシュボード</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <h1><i class="fa-solid fa-shield-halved"></i> 東京リアル治安マップ</h1>
            <span class="subtitle">不動産サイトには載らないリアルな治安指標</span>
        </div>
        <nav class="main-nav">
            <button class="nav-btn active" data-target="map-section"><i class="fa-solid fa-map-location-dot"></i> マップ（スコアリング・ルート）</button>
            <button class="nav-btn" data-target="column-section"><i class="fa-solid fa-book-open"></i> 防犯コラム</button>
        </nav>
    </header>

    <main class="content-container">

        <section id="map-section" class="main-section active">
            <div class="map-dashboard">
                <div class="control-panel">
                    
                    <div class="panel-box">
                        <div class="box-title">
                            <h3><i class="fa-solid fa-sliders"></i> 表示スコアリング</h3>
                            <p>独自ロジックに基づく危険度レベルの切り替え</p>
                        </div>
                        <div class="input-group">
                            <label for="crime-type">犯罪種別スコア</label>
                            <select id="crime-type">
                                <option value="total_danger">総合危険度（面積あたり）</option>
                                <option value="tier1">凶悪犯罪（Tier1: 強盗・暴行など）</option>
                                <option value="tier2">粗暴・侵入（Tier2: 空き巣など）</option>
                                <option value="tier3">非侵入窃盗（Tier3: 自転車盗など）</option>
                            </select>
                        </div>
                        <div class="info-card">
                            <h4><i class="fa-solid fa-circle-info"></i> 現在の表示ロジック</h4>
                            <p id="logic-desc">「対数_危険度レベル」に基づき、面積あたりの総合的な犯罪密度の高さをヒートマップ化しています。</p>
                        </div>
                    </div>

                    <div class="panel-box">
                        <div class="box-title">
                            <h3><i class="fa-solid fa-route"></i> 安全ルート作成（β版）</h3>
                            <p>危険度スコアが高いエリアを迂回するルートを検索</p>
                        </div>
                        <div class="input-group">
                            <label for="start-point">出発地</label>
                            <input type="text" id="start-point" placeholder="例: 新宿駅">
                        </div>
                        <div class="input-group">
                            <label for="end-point">目的地</label>
                            <input type="text" id="end-point" placeholder="例: 東京都庁">
                        </div>
                        <button class="action-btn" id="search-route-btn"><i class="fa-solid fa-magnifying-glass-location"></i> 安全ルートを検索</button>
                        
                        <div id="route-result" class="route-result-card" style="display: none;">
                            <h4>検索結果</h4>
                            <p>スコアによる迂回ルートを計算しました。（※現在はモック表示）</p>
                            <ul class="route-stats">
                                <li>距離: <span id="res-dist">--</span></li>
                                <li>所要時間: <span id="res-time">--</span></li>
                                <li>最大危険度: <span id="res-danger" class="danger-high">高</span></li>
                            </ul>
                        </div>
                    </div>

                </div>

                <div class="map-view">
                    <iframe src="./map/index.html" id="map-frame" title="治安マップ"></iframe>
                    <div id="loading-overlay" class="overlay" style="display: none;">
                        <div class="spinner"></div>
                        <p>データを計算中...</p>
                    </div>
                </div>
            </div>
        </section>

        <head>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        </head>

        <section id="column-section" class="main-section">
            <div class="column-container">
                <div class="section-intro">
                    <h2><i class="fa-solid fa-book-open"></i> 防犯コラム・対策記事</h2>
                </div>

                <div id="column-grid" class="column-grid">
                    <div class="spinner" style="margin: 0 auto;"></div>
                </div>
            </div>
        </section>

        <div id="article-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <button id="close-modal" class="close-btn"><i class="fa-solid fa-xmark"></i> 閉じる</button>
                <div id="article-body" class="markdown-body">
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
